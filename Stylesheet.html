<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --ink: #1c2536;
    --muted: #6b7690;
    --line: #e5e9f2;
    --brand: #4f46e5;
    --brand-ink: #ffffff;
    --brand-soft: #eef0ff;
    --neto: #22c55e;
    --ceremonias: #f59e0b;
    --vacaciones: #3b82f6;
    --curso: #a855f7;
    --evento: #ef4444;
    --chapter: #14b8a6;
    --danger: #dc2626;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.06);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body { font-size: 14px; line-height: 1.45; }

  #app { max-width: 1180px; margin: 0 auto; padding: 0 20px 60px; }

  /* Topbar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 18px 0 14px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--brand), #7c73f0); color: #fff; font-size: 20px;
  }
  .brand-title { font-weight: 700; font-size: 17px; }
  .brand-sub { color: var(--muted); font-size: 12px; }
  .topbar-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .chip {
    background: var(--brand-soft); color: var(--brand); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 600;
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 5px; overflow-x: auto; box-shadow: var(--shadow);
  }
  .tab {
    border: 0; background: transparent; color: var(--muted); font-weight: 600; font-size: 13px;
    padding: 9px 16px; border-radius: 9px; cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--brand); color: var(--brand-ink); }

  .content { margin-top: 20px; }
  .panel { display: none; animation: fade .2s ease; }
  .panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none; } }

  /* Cards & layout */
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px; box-shadow: var(--shadow);
  }
  .card.block { margin-top: 18px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .card-head h3 { margin: 0; font-size: 15px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } }

  .toolbar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .spacer { flex: 1; }
  .muted { color: var(--muted); }
  .small { font-size: 12px; }

  /* Forms */
  .form { display: flex; flex-direction: column; gap: 12px; }
  .form.inline-form { flex-direction: row; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  .field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--muted); font-weight: 600; }
  .field.inline { flex-direction: row; align-items: center; gap: 8px; }
  .field.narrow { max-width: 130px; }
  .field input, .field select, .field textarea {
    border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-size: 14px;
    color: var(--ink); background: #fff; font-family: inherit; outline: none; transition: .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--ink); }
  .form-actions { display: flex; gap: 10px; margin-top: 4px; }

  .btn {
    border: 0; border-radius: 9px; padding: 9px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: .15s;
  }
  .btn.primary { background: var(--brand); color: #fff; }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ghost { background: #f1f3f9; color: var(--muted); }
  .btn.ghost:hover { color: var(--ink); }
  .btn.small { padding: 6px 11px; font-size: 12px; }
  .btn.danger-link { background: transparent; color: var(--danger); padding: 4px 8px; }

  /* Lists */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: #fff;
  }
  .list-item .li-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .li-title { font-weight: 600; }
  .li-sub { color: var(--muted); font-size: 12px; }
  .li-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .li-actions button { border: 0; background: #f1f3f9; color: var(--muted); border-radius: 7px; padding: 5px 9px; cursor: pointer; font-size: 12px; }
  .li-actions button:hover { color: var(--ink); }
  .li-actions button.del:hover { color: var(--danger); }
  .empty { color: var(--muted); font-size: 13px; padding: 16px; text-align: center; border: 1px dashed var(--line); border-radius: 10px; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .tag.vacaciones { background: #dbeafe; color: #1d4ed8; }
  .tag.curso { background: #f3e8ff; color: #7e22ce; }
  .tag.evento { background: #fee2e2; color: #b91c1c; }
  .tag.chapter { background: #ccfbf1; color: #0f766e; }
  .tag.off { background: #f1f5f9; color: #64748b; }

  /* Dashboard cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
  .stat {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
  }
  .stat .label { color: var(--muted); font-size: 12px; font-weight: 600; }
  .stat .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .stat .unit { font-size: 13px; color: var(--muted); font-weight: 600; }
  .stat.accent { background: linear-gradient(135deg, var(--brand), #7c73f0); color: #fff; border: 0; }
  .stat.accent .label, .stat.accent .unit { color: rgba(255,255,255,.85); }

  /* Member capacity rows */
  .members { display: flex; flex-direction: column; gap: 14px; }
  .member-row { }
  .member-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .member-name { font-weight: 600; }
  .member-name small { color: var(--muted); font-weight: 500; margin-left: 6px; }
  .member-neto { font-weight: 700; }
  .member-neto small { color: var(--muted); font-weight: 500; }
  .bar { display: flex; height: 22px; border-radius: 7px; overflow: hidden; background: #eef1f7; }
  .bar span { display: block; height: 100%; }
  .bar .b-neto { background: var(--neto); }
  .bar .b-ceremonias { background: var(--ceremonias); }
  .bar .b-vacaciones { background: var(--vacaciones); }
  .bar .b-curso { background: var(--curso); }
  .bar .b-evento { background: var(--evento); }
  .bar .b-chapter { background: var(--chapter); }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--muted); }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 8px; }
  .tl-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; align-items: center; }
  .tl-name { font-weight: 600; font-size: 13px; }
  .tl-bars { display: flex; flex-direction: column; gap: 4px; }
  .tl-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .tl-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .ceremonia-total { margin-top: 10px; font-weight: 600; font-size: 13px; }

  /* Toast & loader */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1c2536; color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: .25s; z-index: 50; box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }
  .loader { position: fixed; inset: 0; background: rgba(244,246,251,.6); display: grid; place-items: center; z-index: 40; }
  .loader.hidden { display: none; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--brand-soft); border-top-color: var(--brand); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
